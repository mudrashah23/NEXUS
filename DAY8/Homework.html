<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helth detail form</title>
</head>
<body>
  <form>
    <h1>Health Detail Form</h1>

    <fieldset>
    <legend>Personal Information</legend>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required><br><br>

    <label for="dob">Date of birth:</label>
    <input type="date" id="dob" name="age" required><br><br>

    <label for="gender">Gender:</label>
    <select name="Gender" id="gender">
    <option value="Gender" disabled selected>Select Your Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
    </select><br><br>

    <label for="contact">Contact No:</label>
    <input type="tel" id="contact" name="Contact" placeholder="Enter contact no" required><br><br>
    </fieldset>

    <fieldset>
    <legend>Health History</legend>

    <label for="blood">Blood Group:</label>
    <select name="Blood" id="blood">
    <option value="Blood" disabled selected>Select Your Blood Group</option>
    <option value="A+">A+</option>
    <option value="A-">A-</option>
    <option value="B+">B+</option>
    <option value="B-">B-</option>
    <option value="O+">O+</option>
    <option value="O-">O-</option>
    <option value="AB+">AB+</option>
    <option value="AB-">AB-</option>
    </select><br><br>

    <label for="Glasses">Do You Wear Glasses or contact lense?</label><br>
    <input type="radio" id="yes" name="Glasses" value="Yes">
    <label for="yes">Yes</label>
    <input type="radio" id="no" name="Glasses" value="No">
    <label for="no">No</label><br><br>

    <label for="conditions">Pre-exiting Condition</label>
    <input type="textarea" id="conditions" name="conditions" placeholder="Enter any pre-existing conditions"><br><br>

    <label for="allergies">Allergies</label><br>
    <input type="checkbox" id="pollen" name="allergies" value="Pollen">
    <label for="pollen">Pollen</label>
    <input type="checkbox" id="dust" name="allergies" value="Dust">
    <label for="dust">Dust</label>
    <input type="checkbox" id="pets" name="allergies" value="Pets">
    <label for="pets">Pets</label>
    <input type="checkbox" id="food" name="allergies" value="Food"> 
    <label for="food">Food</label>
    <input type="checkbox" id="none" name="allergies" value="none">
    <label for="none">none</label><br><br>

    <label for="medications">Current Medications</label>
    <input type="textarea" id="medications" name="medications" placeholder="Enter any current medications"><br><br>
    </fieldset>
    <fieldset>
    <legend>Emergency Contact</legend>
    <label for="emergency-name">Emergency Contact Name:</label> 
    <input type="text" id="emergency-name" name="emergency-name" placeholder="Enter emergency contact name" required><br><br>
    <label for="emergency-contact">Emergency Contact Number:</label>
    <input type="tel" id="emergency-contact" name="emergency-contact" placeholder="Enter emergency contact number" required><br><br>
    <label for="relationship">Relationship:</label>
    <input type="text" id="relationship" name="relationship" placeholder="Enter relationship with emergency contact" required><br><br>

    </fieldset>
    <button type="submit">Submit</button>
    
  </form>
</body>
</html>
