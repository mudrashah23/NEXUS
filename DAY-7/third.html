<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedBack Form</title>
</head>
<body>
  <form>
    <h1>Feedback Form</h1>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required><br><br>

    <label>Rate Us:</label>
    <input type="radio" id="1" name="rating">
    <label for="1">1 Star</label>
    <input type="radio" id="2" name="rating">
    <label for="2">2 Stars</label>
    <input type="radio" id="3" name="rating">
    <label for="3">3 Stars</label>
    <input type="radio" id="4" name="rating">
    <label for="4">4 Stars</label>
    <input type="radio" id="5" name="rating">
    <label for="5">5 Stars</label><br><br>

    <label for="comments">Comments:</label>
    <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br><br>

    <button type="submit">Submit Feedback</button>
  </form>
</body>
</html>
